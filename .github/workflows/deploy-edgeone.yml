name: Deploy to EdgeOne Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-edgeone
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site with sub-apps
        run: npm run build:site
        env:
          VITE_BASE: /
          VITE_STUDENT_DDL_URL: /student-ddl/
          VITE_STARTRAIL_NOTES_URL: /startrail-notes/
          VITE_TRAVELER_WEATHER_URL: /traveler-weather/
          VITE_TRAVELER_AI_URL: /traveler-ai/

      - name: Deploy to EdgeOne Pages
        id: deploy
        run: |
          set -euo pipefail
          npx edgeone pages deploy ./dist -n developerprofiles -t "$EDGEONE_API_TOKEN" -e production 2>&1 | tee deploy.log
          DEPLOY_URL=$(grep -oE 'EDGEONE_DEPLOY_URL=[^[:space:]]+' deploy.log | head -1 | cut -d= -f2-)
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}

      - name: Deployment summary
        if: steps.deploy.outputs.deploy_url != ''
        run: |
          echo "## EdgeOne 部署链接" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "预览链接（含鉴权，约 3 小时有效，**请用此链接访问**）：" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.deploy.outputs.deploy_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "裸域名 \`https://developerprofiles-s1fnxmxn.edgeone.cool\` 在中国大陆可能返回 401，请绑定自定义域名或见 docs/DEPLOY-EDGEONE-PAGES.md。" >> "$GITHUB_STEP_SUMMARY"
