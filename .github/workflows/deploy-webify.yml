name: Deploy to Tencent Webify

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-webify
  cancel-in-progress: true

env:
  COS_BUCKET: fc25-static-cursor-d2gitn6fg62fef67d-1435930849
  COS_REGION: ap-shanghai

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site with sub-apps
        run: npm run build:site

      - name: Setup COS CLI
        uses: git9527/setup-coscli@v2
        with:
          region: ${{ env.COS_REGION }}
          secret-id: ${{ secrets.TENCENT_SECRET_ID }}
          secret-key: ${{ secrets.TENCENT_SECRET_KEY }}
          bucket: ${{ env.COS_BUCKET }}

      - name: Upload dist to static hosting bucket
        run: coscli sync ./dist/ cos://${{ env.COS_BUCKET }}/ -r
