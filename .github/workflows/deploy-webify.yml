name: Deploy to Tencent Webify

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-webify
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site with sub-apps
        run: npm run build:site

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Deploy to static hosting
        env:
          TENCENTCLOUD_SECRETID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENTCLOUD_SECRETKEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: tcb hosting deploy ./dist / -e cursor-d2gitn6fg62fef67d
